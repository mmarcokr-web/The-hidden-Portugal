<!DOCTYPE html>
<html lang="pt">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9096924320506926"
     crossorigin="anonymous">
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Hidden Portugal | Contacts</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .contact-container { max-width: 600px; margin: 40px auto; padding: 20px; font-family: sans-serif; }
        .contact-form { display: flex; flex-direction: column; gap: 15px; background: #f9f9f9; padding: 20px; border-radius: 8px; }
        .form-group { display: flex; flex-direction: column; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; margin-top: 5px; }
        .submit-btn { background-color: #2d5a27; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .submit-btn:disabled { background-color: #ccc; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
        #status.success { color: #2d5a27; }
        #status.error { color: #ff6b6b; }
    </style>
</head>
<body>

    <header class="main-header">
        <a href="/index.html" style="text-decoration: none; color: white;">
            <h1>The <span style="color: #ff6b6b;">Hidden</span> Portugal</h1>
        </a>
        <nav>
            <ul>
                <li><a href="/Arrabida/walkingtrails/walkingtrails.html">walking trails</a></li>
                <li><a href="/contacts/contacts.html">Contacts</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-container">
        <section class="contact-intro">
            <h2>Get in Touch</h2>
            <p>Have questions or suggestions? Drop us a message below.</p>
        </section>

        <form id="my-form" action="https://formspree.io/f/mbdqzgek" method="POST" class="contact-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" placeholder="Your name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="_replyto" placeholder="Your email" required>
            </div>

            <div class="form-group">
                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Tell us about your discovery..." required></textarea>
            </div>

            <button type="submit" id="submit-btn" class="submit-btn">Send Message</button>
            <p id="status"></p>
        </form>
    </main>

    <footer>
        <p>&copy; 2026 The Hidden Portugal. <a href="privacy-policy.html">Privacy Policy</a></p>
    </footer>

    <script>
        var form = document.getElementById("my-form");
        
        async function handleSubmit(event) {
          event.preventDefault(); // Impede o refresh da página
          var status = document.getElementById("status");
          var data = new FormData(event.target);
          var button = document.getElementById("submit-btn");

          button.disabled = true;
          status.innerHTML = "Sending...";

          fetch(event.target.action, {
            method: form.method,
            body: data,
            headers: { 'Accept': 'application/json' }
          }).then(response => {
            if (response.ok) {
              status.className = "success";
              status.innerHTML = "Thanks! Your message has been sent.";
              form.reset();
              button.disabled = false;
            } else {
              status.className = "error";
              status.innerHTML = "Oops! There was a problem.";
              button.disabled = false;
            }
          }).catch(error => {
            status.className = "error";
            status.innerHTML = "Error connecting to the server.";
            button.disabled = false;
          });
        }
        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
